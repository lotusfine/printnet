services:
  backend:
    build: ./backend
    container_name: glaxara-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    networks:
      - glaxara-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/informacion"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build: ./frontend
    container_name: glaxara-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - glaxara-network

networks:
  glaxara-network:
    driver: bridge